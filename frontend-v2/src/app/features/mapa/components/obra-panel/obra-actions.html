<div class="actions">
  @if (obra().urlInfobras) {
    <a
      class="btn-ver-ficha"
      [href]="obra().urlInfobras!"
      target="_blank"
      rel="noopener noreferrer"
    >
      <span>Ver ficha completa</span>
      <app-icon name="open_in_new" />
    </a>
  } @else {
    <button class="btn-ver-ficha" type="button" disabled>
      <span>Ficha no disponible</span>
    </button>
  }

  <button class="btn-chat" type="button" (click)="openChat()" aria-label="Preguntar a la IA sobre esta obra">
    <app-icon name="auto_awesome" />
    <span>Preguntar a la IA</span>
  </button>

  <div class="fuente">
    <app-icon name="source" />
    <span>Fuente: <strong>{{ obra().fuente }}</strong></span>
  </div>
</div>
